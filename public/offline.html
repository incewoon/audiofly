<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>AudioFly — 오프라인</title>
    <link rel="manifest" href="/manifest.json" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        width: 100%;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 28px 24px;
        text-align: center;
      }
      .logo { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 8px; }
      .badge {
        display: inline-block;
        font-size: 12px;
        padding: 2px 10px;
        background: #334155;
        border-radius: 999px;
        color: #94a3b8;
        margin-bottom: 16px;
      }
      h1 { font-size: 18px; margin: 0 0 12px; }
      p { font-size: 14px; line-height: 1.6; color: #cbd5e1; margin: 0 0 12px; }
      button {
        margin-top: 16px;
        width: 100%;
        padding: 12px 16px;
        border-radius: 10px;
        border: 0;
        background: #38bdf8;
        color: #0f172a;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
      }
      button:active { transform: translateY(1px); }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo">AudioFly</div>
      <div class="badge">오프라인</div>
      <h1>지금은 앱을 새로 열 수 없어요</h1>
      <p>
        인터넷 연결이 끊겨 앱 화면을 새로 불러오지 못했습니다.
        네트워크를 켠 뒤 다시 시도해 주세요.
      </p>
      <p>
        이미 열려 있던 AudioFly 탭에서는 MP4 → MP3 변환, MP3 태그 편집, 가사 자동추출이
        캐시된 엔진으로 계속 동작합니다.
      </p>
      <button type="button" onclick="location.reload()">다시 시도</button>
    </main>
  </body>
</html>
